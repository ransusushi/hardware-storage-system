{% extends "base.html" %}
{% from "_macros.html" import page_header %}
{% block title %}{{ 'Edit' if row else 'New' }} product{% endblock %}
{% block content %}
{{ page_header(('Edit product' if row else 'New product')) }}
<div class="card card-soft"><div class="card-body">
<form method="post" class="row g-3">
  <div class="col-md-4">
    <label class="form-label">SKU</label>
    <input class="form-control" name="sku" required value="{{ row.sku if row else '' }}">
  </div>
  <div class="col-md-8">
    <label class="form-label">Name</label>
    <input class="form-control" name="name" required value="{{ row.name if row else '' }}">
  </div>
  <div class="col-md-4">
    <label class="form-label">Category</label>
    <select class="form-select" name="category_id" required>
      {% for c in categories %}
        <option value="{{ c.category_id }}" {% if row and row.category_id == c.category_id %}selected{% endif %}>{{ c.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-4">
    <label class="form-label">Supplier</label>
    <select class="form-select" name="supplier_id" required>
      {% for s in suppliers %}
        <option value="{{ s.supplier_id }}" {% if row and row.supplier_id == s.supplier_id %}selected{% endif %}>{{ s.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-4">
    <label class="form-label">Unit price (₱)</label>
    <input class="form-control" name="unit_price" type="number" step="0.01" min="0" required
           value="{{ row.unit_price if row else '0.00' }}">
  </div>
  <div class="col-md-12">
    <label class="form-label">Description</label>
    <textarea class="form-control" name="description" rows="3">{{ row.description if row else '' }}</textarea>
  </div>
  <div class="col-12 d-flex gap-2">
    <button class="btn btn-primary">Save</button>
    <a class="btn btn-outline-secondary" href="{{ url_for('products.list_view') }}">Cancel</a>
  </div>
</form>
</div></div>
{% endblock %}
