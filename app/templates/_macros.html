{% macro action_buttons(edit_url, delete_url, label='Item') %}
<div class="d-flex gap-1 justify-content-end">
  <a class="btn btn-sm btn-outline-primary" href="{{ edit_url }}">Edit</a>
  <form method="post" action="{{ delete_url }}"
        onsubmit="return confirm('Delete this {{ label }}?')" class="m-0">
    <button class="btn btn-sm btn-outline-danger">Delete</button>
  </form>
</div>
{% endmacro %}

{% macro page_header(title, subtitle='', new_url=None, new_label='Add') %}
<div class="d-flex justify-content-between align-items-end mb-3">
  <div>
    <h1 class="page-title">{{ title }}</h1>
    {% if subtitle %}<p class="text-muted mb-0">{{ subtitle }}</p>{% endif %}
  </div>
  {% if new_url %}
    <a class="btn btn-primary" href="{{ new_url }}">{{ new_label }}</a>
  {% endif %}
</div>
{% endmacro %}
