{% extends "base.html" %}
{% from "_macros.html" import page_header %}
{% block title %}{{ 'Edit' if row else 'New' }} category{% endblock %}
{% block content %}
{{ page_header(('Edit category' if row else 'New category'), 'Categories group similar hardware.') }}
<div class="card card-soft"><div class="card-body">
<form method="post" class="row g-3">
  <div class="col-md-6">
    <label class="form-label">Name</label>
    <input class="form-control" name="name" required value="{{ row.name if row else '' }}">
  </div>
  <div class="col-md-12">
    <label class="form-label">Description</label>
    <textarea class="form-control" name="description" rows="3">{{ row.description if row else '' }}</textarea>
  </div>
  <div class="col-12 d-flex gap-2">
    <button class="btn btn-primary">Save</button>
    <a class="btn btn-outline-secondary" href="{{ url_for('categories.list_view') }}">Cancel</a>
  </div>
</form>
</div></div>
{% endblock %}
