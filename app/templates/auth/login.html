{% extends "base.html" %}
{% block title %}Sign in &middot; Hardware Storage System{% endblock %}
{% block content %}
<div class="card card-soft login-card">
  <div class="brand">
    <h1>Hardware Storage</h1>
    <p>Staff portal</p>
  </div>
  <div class="card-body p-4">
    <h2 class="h6 mb-1">Welcome back</h2>
    <p class="text-muted small mb-4">Sign in with your staff credentials.</p>
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input class="form-control" name="username" autofocus
               value="{{ username or '' }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" name="password" required>
      </div>
      <button class="btn btn-primary w-100">Sign in</button>
    </form>
    <hr>
    <p class="small text-muted mb-0">
      Seeded accounts: <code class="inline">admin</code>, <code class="inline">mlopez</code>,
      <code class="inline">jdcruz</code>, <code class="inline">asantos</code>
      — password <code class="inline">password123</code>.
    </p>
  </div>
</div>
{% endblock %}
