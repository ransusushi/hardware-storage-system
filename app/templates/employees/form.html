{% extends "base.html" %}
{% from "_macros.html" import page_header %}
{% block title %}{{ 'Edit' if row else 'New' }} employee{% endblock %}
{% block content %}
{{ page_header(('Edit employee' if row else 'New employee')) }}
<div class="card card-soft"><div class="card-body">
<form method="post" class="row g-3">
  <div class="col-md-6">
    <label class="form-label">Username</label>
    <input class="form-control" name="username" required value="{{ row.username if row else '' }}">
  </div>
  <div class="col-md-6">
    <label class="form-label">Password {% if row %}<small class="text-muted">(leave blank to keep current)</small>{% endif %}</label>
    <input class="form-control" type="password" name="password" {% if not row %}required{% endif %}>
  </div>
  <div class="col-md-6">
    <label class="form-label">Full name</label>
    <input class="form-control" name="full_name" required value="{{ row.full_name if row else '' }}">
  </div>
  <div class="col-md-6">
    <label class="form-label">Email</label>
    <input class="form-control" name="email" type="email" required value="{{ row.email if row else '' }}">
  </div>
  <div class="col-md-4">
    <label class="form-label">Phone</label>
    <input class="form-control" name="phone" value="{{ row.phone if row else '' }}">
  </div>
  <div class="col-md-4">
    <label class="form-label">Role</label>
    <select class="form-select" name="role_id" required>
      {% for r in roles %}
        <option value="{{ r.role_id }}" {% if row and row.role_id == r.role_id %}selected{% endif %}>{{ r.role_name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-4 d-flex align-items-end">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="is_active" name="is_active"
             {% if not row or row.is_active %}checked{% endif %}>
      <label class="form-check-label" for="is_active">Account active</label>
    </div>
  </div>
  <div class="col-12 d-flex gap-2">
    <button class="btn btn-primary"><i class="bi bi-check2"></i> Save</button>
    <a class="btn btn-outline-secondary" href="{{ url_for('employees.list_view') }}">Cancel</a>
  </div>
</form>
</div></div>
{% endblock %}
